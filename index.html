<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoops: Dynamic Basketball</title>
    <style>
        :root {
            --primary: #FF5A5F;
            --secondary: #087E8B;
            --dark: #2C2C2C;
            --light: #F5F5F5;
            --floor: #F29C38;
            --hoop: #E63946;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--dark);
            color: var(--light);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #1A1A2E 0%, #16213E 100%);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .hud {
            position: absolute;
            top: 30px;
            left: 40px;
            z-index: 10;
            pointer-events: none;
        }

        .score-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .score-value {
            color: var(--primary);
            font-size: 36px;
            margin-left: 10px;
        }

        .power-meter-container {
            width: 250px;
            height: 24px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            position: relative;
        }

        .power-bar {
            height: 100%;
            width: 50%;
            background: linear-gradient(90deg, #FFC371 0%, #FF5F6D 100%);
            border-radius: 10px;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px rgba(255, 95, 109, 0.5);
        }

        .power-label {
            position: absolute;
            top: -25px;
            left: 0;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 1px;
        }

        #message-overlay {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            font-size: 80px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            opacity: 0;
            pointer-events: none;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 20;
        }

        #message-overlay.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .instructions {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 20px;
        }

        .key {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
            color: white;
            box-shadow: 0 2px 0 rgba(255, 255, 255, 0.1);
        }

    </style>
</head>
<body>

<div id="game-container">
    <div class="hud">
        <div class="score-box" id="score-container">
            STREAK <span class="score-value" id="score">0</span>
        </div>
        <div style="position: relative; margin-top: 40px;">
            <div class="power-label">THROW POWER</div>
            <div class="power-meter-container">
                <div class="power-bar" id="power-bar"></div>
            </div>
        </div>
    </div>
    
    <div id="message-overlay">SWISH!</div>
    
    <div class="instructions">
        <span><span class="key">←</span> <span class="key">→</span> Move</span>
        <span><span class="key">↑</span> <span class="key">↓</span> Power</span>
        <span><span class="key">SPACE</span> Shoot</span>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    /**
     * Engine & Rendering Initialization
     */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const scoreContainer = document.getElementById('score-container');
    const powerBarEl = document.getElementById('power-bar');
    const messageEl = document.getElementById('message-overlay');

    // Handle high DPI displays
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        world.floorY = canvas.height - 150;
        if (player.y > world.floorY) player.y = world.floorY;
    }
    window.addEventListener('resize', resize);

    /**
     * Game State & Constants
     */
    const state = {
        phase: 'AIMING', // AIMING, FLYING, RESOLVING
        streak: 0,
        power: 50, 
        lastTime: 0
    };

    const world = {
        gravity: 0.6,
        floorY: 0, 
        restitution: 0.7, 
        friction: 0.98,
        airResistance: 0.995
    };

    const keys = { ArrowLeft: false, ArrowRight: false, ArrowUp: false, ArrowDown: false, " ": false };

    /**
     * Entities
     */
    const player = {
        x: 200,
        y: 0, 
        speed: 7,
    };

    const ball = {
        x: 0, y: 0,
        vx: 0, vy: 0,
        radius: 14,
        color: '#F77F00',
        prevX: 0, prevY: 0,
        rotation: 0,
        angularVelocity: 0
    };

    const basket = {
        x: 0, y: 0,
        backboardHeight: 120,
        backboardWidth: 10,
        rimRadius: 35,
        rimYOffset: 90, 
        rimThickness: 6
    };

    const particles = [];

    /**
     * Utility Functions
     */
    function clamp(val, min, max) {
        return Math.max(min, Math.min(max, val));
    }

    function showMessage(text, color, isSuccess) {
        messageEl.textContent = text;
        messageEl.style.color = color;
        messageEl.style.textShadow = `0 10px 30px ${color}88, 0 5px 15px rgba(0,0,0,0.5)`;
        messageEl.classList.add('show');
        
        if (isSuccess) {
            scoreContainer.style.transform = 'scale(1.1)';
            setTimeout(() => scoreContainer.style.transform = 'scale(1)', 200);
        }

        setTimeout(() => {
            messageEl.classList.remove('show');
        }, 1500);
    }

    function createParticles(x, y, color, count) {
        for (let i = 0; i < count; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.5) * 10 - 5,
                life: 1.0, decay: 0.02 + Math.random() * 0.03,
                color: color, size: 2 + Math.random() * 4
            });
        }
    }

    function randomizeBasket() {
        const minX = canvas.width * 0.55;
        const maxX = canvas.width * 0.85;
        const minY = canvas.height * 0.2;
        const maxY = canvas.height * 0.5;

        basket.x = minX + Math.random() * (maxX - minX);
        basket.y = minY + Math.random() * (maxY - minY);
    }

    function resetTurn(missed) {
        state.phase = 'AIMING';
        ball.vx = 0;
        ball.vy = 0;
        ball.angularVelocity = 0;
        
        if (missed) {
            state.streak = 0;
            scoreEl.textContent = state.streak;
            // Basket stays in the same position
        } else {
            randomizeBasket();
        }
    }

    /**
     * Input Handling
     */
    window.addEventListener('keydown', (e) => {
        if (keys.hasOwnProperty(e.key)) {
            keys[e.key] = true;
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(e.key)) e.preventDefault();
        }
    });

    window.addEventListener('keyup', (e) => {
        if (keys.hasOwnProperty(e.key)) {
            keys[e.key] = false;
        }
    });

    /**
     * Game Logic Update
     */
    function update() {
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx; p.y += p.vy;
            p.vy += world.gravity * 0.5;
            p.life -= p.decay;
            if (p.life <= 0) particles.splice(i, 1);
        }

        if (state.phase === 'AIMING') {
            if (keys.ArrowLeft) player.x -= player.speed;
            if (keys.ArrowRight) player.x += player.speed;
            
            player.x = clamp(player.x, 20, canvas.width * 0.4);

            if (keys.ArrowUp) state.power += 1.5;
            if (keys.ArrowDown) state.power -= 1.5;
            state.power = clamp(state.power, 5, 100);

            powerBarEl.style.width = `${state.power}%`;
            
            if (state.power < 30) powerBarEl.style.background = 'linear-gradient(90deg, #A8E6CF 0%, #3BCA9F 100%)';
            else if (state.power < 70) powerBarEl.style.background = 'linear-gradient(90deg, #FFD3B6 0%, #FFAA6C 100%)';
            else powerBarEl.style.background = 'linear-gradient(90deg, #FF8B94 0%, #FF5A5F 100%)';

            // Hold ball (Side profile hands)
            ball.x = player.x + 45;
            ball.y = player.y - 135;
            ball.rotation = 0;

            if (keys[" "]) {
                state.phase = 'FLYING';
                
                const maxVel = 32;
                const vel = (state.power / 100) * maxVel;
                const angle = Math.PI / 3.2; // Fixed angle
                
                ball.vx = vel * Math.cos(angle);
                ball.vy = -vel * Math.sin(angle);
                ball.angularVelocity = -0.1;
                
                keys[" "] = false; 
            }
        } else if (state.phase === 'FLYING') {
            ball.prevX = ball.x;
            ball.prevY = ball.y;

            ball.vy += world.gravity;
            ball.vx *= world.airResistance;
            ball.vy *= world.airResistance;
            
            ball.x += ball.vx;
            ball.y += ball.vy;
            ball.rotation += ball.angularVelocity;

            const rimFrontX = basket.x - basket.rimRadius * 2;
            const rimY = basket.y + basket.rimYOffset;

            // 1. Floor
            if (ball.y + ball.radius > world.floorY) {
                ball.y = world.floorY - ball.radius;
                ball.vy *= -world.restitution;
                ball.vx *= world.friction;
                ball.angularVelocity *= world.friction;

                if (Math.abs(ball.vy) > 2) {
                    createParticles(ball.x, ball.y + ball.radius, '#555', 5);
                }

                checkMissed();
            }

            // 2. Wall
            if (ball.x + ball.radius > canvas.width) {
                ball.x = canvas.width - ball.radius;
                ball.vx *= -world.restitution;
            } else if (ball.x - ball.radius < 0) {
                ball.x = ball.radius;
                ball.vx *= -world.restitution;
            }

            // 3. Backboard
            if (ball.x + ball.radius > basket.x && ball.prevX + ball.radius <= basket.x) {
                if (ball.y > basket.y && ball.y < basket.y + basket.backboardHeight) {
                    ball.x = basket.x - ball.radius;
                    ball.vx *= -world.restitution * 0.8;
                    createParticles(ball.x + ball.radius, ball.y, '#fff', 8);
                }
            }

            // 4. Front Rim
            const distFront = Math.hypot(ball.x - rimFrontX, ball.y - rimY);
            if (distFront < ball.radius + basket.rimThickness / 2) {
                resolveCircleCollision(ball, rimFrontX, rimY, basket.rimThickness / 2);
                ball.angularVelocity -= ball.vx * 0.05; 
                createParticles(rimFrontX, rimY, '#E63946', 5);
            }

            // 5. Back Rim
            const rimBackX = basket.x - basket.rimThickness;
            const distBack = Math.hypot(ball.x - rimBackX, ball.y - rimY);
            if (distBack < ball.radius + basket.rimThickness / 2) {
                resolveCircleCollision(ball, rimBackX, rimY, basket.rimThickness / 2);
            }

            // 6. Scoring
            if (ball.prevY < rimY && ball.y >= rimY && ball.vy > 0) {
                if (ball.x > rimFrontX + ball.radius * 0.5 && ball.x < basket.x - ball.radius * 0.5) {
                    scoreGoal();
                }
            }
            
            // Off screen bottom
            if (ball.y > canvas.height + 50) {
                checkMissed(true);
            }
        }
    }

    function resolveCircleCollision(ballEntity, cx, cy, cRadius) {
        const dx = ballEntity.x - cx;
        const dy = ballEntity.y - cy;
        const dist = Math.hypot(dx, dy);
        
        const nx = dx / dist;
        const ny = dy / dist;
        ballEntity.x = cx + nx * (ballEntity.radius + cRadius);
        ballEntity.y = cy + ny * (ballEntity.radius + cRadius);
        
        const dot = ballEntity.vx * nx + ballEntity.vy * ny;
        ballEntity.vx -= 2 * dot * nx * world.restitution;
        ballEntity.vy -= 2 * dot * ny * world.restitution;
    }

    function scoreGoal() {
        state.phase = 'RESOLVING';
        state.streak += 1;
        scoreEl.textContent = state.streak;
        showMessage("SWISH!", "#06D6A0", true);
        createParticles(basket.x - basket.rimRadius, basket.y + basket.rimYOffset + 20, '#F77F00', 30);
        
        setTimeout(() => {
            resetTurn(false);
        }, 2000);
    }

    function checkMissed(force = false) {
        if (state.phase !== 'FLYING') return;
        
        if (force || (Math.abs(ball.vy) < 1.5 && Math.abs(ball.vx) < 1 && ball.y >= world.floorY - ball.radius - 2)) {
            state.phase = 'RESOLVING';
            showMessage("BRICK...", "#EF476F", false);
            setTimeout(() => {
                resetTurn(true);
            }, 2000);
        }
    }

    /**
     * Rendering
     */
    function drawDetailedPlayer() {
        ctx.save();
        ctx.translate(player.x, player.y);
        
        const skin = '#8D5524', jersey = '#FFD166', shorts = '#118AB2', shoes = '#fff';

        // Legs (Side profile)
        ctx.fillStyle = skin;
        ctx.fillRect(-5, -60, 10, 60); // Back leg
        ctx.fillRect(10, -60, 10, 60);  // Front leg

        // Shorts
        ctx.fillStyle = shorts;
        ctx.fillRect(-10, -100, 20, 50); // Back short
        ctx.fillRect(5, -100, 20, 50);  // Front short

        // Torso
        ctx.fillStyle = jersey;
        ctx.beginPath();
        ctx.moveTo(-15, -110);
        ctx.lineTo(25, -110);
        ctx.lineTo(20, -170);
        ctx.lineTo(-10, -170);
        ctx.fill();

        // Jersey Number
        ctx.fillStyle = '#EF476F';
        ctx.font = 'bold 24px Arial';
        ctx.fillText('23', 0, -130);

        // Head
        ctx.fillStyle = skin;
        ctx.beginPath();
        ctx.arc(5, -185, 15, 0, Math.PI * 2);
        ctx.fill();
        
        // Headband
        ctx.fillStyle = '#fff';
        ctx.fillRect(-10, -195, 30, 5);

        // Arms
        ctx.strokeStyle = skin;
        ctx.lineWidth = 10;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        
        ctx.beginPath();
        if (state.phase === 'AIMING') {
            // Holding ball
            ctx.moveTo(5, -160);
            ctx.lineTo(25, -130); // elbow
            ctx.lineTo(45, -135); // hand
        } else {
            // Shot follow through
            ctx.moveTo(5, -160);
            ctx.lineTo(30, -200); // elbow
            ctx.lineTo(50, -210); // hand
        }
        ctx.stroke();

        // Shoes
        ctx.fillStyle = shoes;
        ctx.beginPath();
        ctx.ellipse(-5, -5, 12, 6, 0, 0, Math.PI*2);
        ctx.ellipse(15, -5, 12, 6, 0, 0, Math.PI*2);
        ctx.fill();

        ctx.restore();
    }

    function drawBasket() {
        // Pole
        ctx.fillStyle = '#4A4E69';
        ctx.fillRect(basket.x + basket.backboardWidth, basket.y + basket.backboardHeight, 15, world.floorY - (basket.y + basket.backboardHeight));

        // Backboard
        ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
        ctx.fillRect(basket.x, basket.y, basket.backboardWidth, basket.backboardHeight);
        ctx.strokeStyle = '#F8F9FA';
        ctx.lineWidth = 3;
        ctx.strokeRect(basket.x, basket.y, basket.backboardWidth, basket.backboardHeight);
        
        // Target Box
        ctx.strokeStyle = '#E63946';
        ctx.lineWidth = 4;
        const targetSize = 40;
        ctx.strokeRect(basket.x, basket.y + basket.rimYOffset - targetSize, basket.backboardWidth, targetSize);

        // Net
        const rimFrontX = basket.x - basket.rimRadius * 2;
        const rimY = basket.y + basket.rimYOffset;
        
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        const netBottomY = rimY + 50;
        ctx.moveTo(basket.x, rimY);
        ctx.lineTo(basket.x - 10, netBottomY);
        ctx.lineTo(rimFrontX + 10, netBottomY);
        ctx.lineTo(rimFrontX, rimY);
        
        for(let i=1; i<4; i++) {
            ctx.moveTo(basket.x - (basket.rimRadius*2) * (i/4), rimY);
            ctx.lineTo(basket.x - 10 - (basket.rimRadius*2 - 20)*(i/4), netBottomY);
        }
        ctx.stroke();

        // Rim
        ctx.fillStyle = '#E63946';
        ctx.beginPath();
        ctx.roundRect(rimFrontX, rimY - basket.rimThickness/2, basket.rimRadius * 2, basket.rimThickness, basket.rimThickness/2);
        ctx.fill();
        
        ctx.fillStyle = '#FFA69E';
        ctx.beginPath();
        ctx.arc(rimFrontX + basket.rimThickness/2, rimY, basket.rimThickness/2 - 1, 0, Math.PI*2);
        ctx.fill();
    }

    function drawBall() {
        ctx.save();
        ctx.translate(ball.x, ball.y);
        ctx.rotate(ball.rotation);

        ctx.fillStyle = ball.color;
        ctx.beginPath();
        ctx.arc(0, 0, ball.radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = '#2B2D42';
        ctx.lineWidth = 1.5;
        
        ctx.beginPath();
        ctx.moveTo(0, -ball.radius); ctx.lineTo(0, ball.radius);
        ctx.moveTo(-ball.radius, 0); ctx.lineTo(ball.radius, 0);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(-ball.radius * 0.7, -ball.radius * 0.7);
        ctx.quadraticCurveTo(0, 0, -ball.radius * 0.7, ball.radius * 0.7);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(ball.radius * 0.7, -ball.radius * 0.7);
        ctx.quadraticCurveTo(0, 0, ball.radius * 0.7, ball.radius * 0.7);
        ctx.stroke();

        const grad = ctx.createRadialGradient(-ball.radius/3, -ball.radius/3, 1, 0, 0, ball.radius);
        grad.addColorStop(0, 'rgba(255,255,255,0.3)');
        grad.addColorStop(1, 'rgba(0,0,0,0.4)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(0, 0, ball.radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }

    function drawTrajectoryGuide() {
        if (state.phase !== 'AIMING') return;

        ctx.beginPath();
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
        ctx.lineWidth = 2;
        ctx.setLineDash([8, 8]);
        
        let tx = ball.x;
        let ty = ball.y;
        
        const maxVel = 32;
        const vel = (state.power / 100) * maxVel;
        const angle = Math.PI / 3.2; 
        
        let tvx = vel * Math.cos(angle);
        let tvy = -vel * Math.sin(angle);
        
        ctx.moveTo(tx, ty);
        for (let i = 0; i < 40; i++) {
            tvy += world.gravity;
            tvx *= world.airResistance;
            tvy *= world.airResistance;
            tx += tvx;
            ty += tvy;
            ctx.lineTo(tx, ty);
            if (ty >= world.floorY) break;
        }
        ctx.stroke();
        ctx.setLineDash([]);
    }

    function drawParticles() {
        particles.forEach(p => {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.globalAlpha = 1.0;
    }

    function draw() {
        ctx.fillStyle = 'rgba(26, 26, 46, 0.4)'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const floorGradient = ctx.createLinearGradient(0, world.floorY, 0, canvas.height);
        floorGradient.addColorStop(0, '#E29578');
        floorGradient.addColorStop(1, '#B56576');
        ctx.fillStyle = floorGradient;
        
        ctx.beginPath();
        ctx.moveTo(0, world.floorY);
        ctx.lineTo(canvas.width, world.floorY);
        ctx.lineTo(canvas.width, canvas.height);
        ctx.lineTo(0, canvas.height);
        ctx.fill();

        ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(canvas.width * 0.7, world.floorY);
        ctx.lineTo(canvas.width * 0.9, canvas.height);
        ctx.stroke();

        drawTrajectoryGuide();
        drawBasket();
        drawDetailedPlayer();
        drawBall();
        drawParticles();
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    // Initialize
    resize();
    player.y = world.floorY;
    resetTurn(false);
    requestAnimationFrame(loop);

</script>
</body>
</html>
